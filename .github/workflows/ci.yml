name: CI

on:
  push:
  pull_request:

jobs:
  fresh-falsification:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install .[dev]
      - name: Replay fresh falsification packet
        run: zpe-image-verify --output validation/results/fresh_falsification_check.ci.json
      - name: Run tests
        run: pytest -q
